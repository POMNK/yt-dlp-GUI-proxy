name: Build EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish Self-Contained Single File
      run: dotnet publish --configuration Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output ./final-exe

    - name: Prepare Release Folder Structure
      run: |
        mkdir release-pack
        move .\final-exe\yt-dlp-gui.exe .\release-pack\yt-dlp-gui.exe
        mkdir .\release-pack\utils
        echo Place yt-dlp.exe, ffmpeg.exe and ffprobe.exe here. > .\release-pack\utils\readme.txt
      shell: cmd

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-dlp-gui
        path: release-pack/
