name: Build EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish Self-Contained Single File
      run: dotnet publish ./yt-dlp-GUI/yt-dlp-GUI.csproj --configuration Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output ./final-build

    - name: Create Utils Folder and Readme
      run: |
        New-Item -ItemType Directory -Force -Path .\final-build\utils
        "Place yt-dlp.exe, ffmpeg.exe and ffprobe.exe here." | Out-File -FilePath .\final-build\utils\readme.txt -Encoding utf8
        Remove-Item -Path .\final-build\*.pdb -Force -ErrorAction Ignore
        Remove-Item -Path .\final-build\*.config -Force -ErrorAction Ignore
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-dlp-gui
        path: final-build/
